# Name of the pipeline as it appears in the GitHub Actions tab
name: Build and Push Frontend to ECR

# ─────────────────────────────────────────────
# TRIGGER: run on every push to master
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - master

# ─────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Get your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up AWS credentials from GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3 — Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4 — Build, tag, and push the frontend image
      # The frontend has no database secret. The backend URL is already
      # set inside src/api/axiosConfig.js and gets baked into the build.
      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest